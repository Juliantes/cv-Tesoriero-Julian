<!doctype html>
<html lang="es" class="page-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Desarrollador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-body">
    <main class="cv" id="cvRoot">
      <header class="hero">
        <div class="hero__left">
          <div class="avatar" aria-hidden="true">
            <img
              class="avatar__photo"
              src="https://i.pravatar.cc/300?img=12"
              alt="Foto de perfil"
            />
            <span class="avatar__initials" id="initials">AP</span>
          </div>
          <div class="hero__meta">
            <h1 class="hero__name" id="fullName">—</h1>
            <p class="hero__role" id="role">—</p>
            <p class="hero__tagline" id="tagline">—</p>
            <div class="chips" id="topChips"></div>
          </div>
        </div>

        <div class="hero__right">
          <div class="actions">
            <button id="downloadPdfBtn" class="btn" type="button">Descargar PDF</button>
            <a id="githubBtn" class="btn btn--ghost" href="#" target="_blank" rel="noreferrer">GitHub</a>
          </div>

          <div class="contact" id="contact"></div>
        </div>
      </header>

      <section class="grid">
        <section class="card">
          <div class="card__head">
            <h2 class="card__title">Sobre mí</h2>
          </div>
          <p class="card__text" id="about">—</p>
        </section>

        <section class="card">
          <div class="card__head">
            <h2 class="card__title">Skills</h2>
            <span class="badge" id="yearsBadge">—</span>
          </div>
          <div class="skills" id="skills"></div>
        </section>
      </section>

      <section class="card">
        <div class="card__head">
          <h2 class="card__title">Experiencia</h2>
          <span class="muted" id="location">—</span>
        </div>
        <div class="timeline" id="experience"></div>
      </section>

      <section class="card">
        <div class="card__head">
          <h2 class="card__title">Proyectos</h2>
          <span class="muted">Repositorios / demos</span>
        </div>
        <div class="projects" id="projects"></div>
      </section>

      <section class="card no-print" aria-labelledby="contactFormTitle">
        <div class="card__head">
          <h2 class="card__title" id="contactFormTitle">Contacto</h2>
          <span class="muted">Formulario de ejemplo</span>
        </div>
        <form id="contactForm" class="form" action="#" method="post">
          <div class="form__row">
            <label class="form__label" for="nombre">Nombre</label>
            <input
              class="form__input"
              type="text"
              id="nombre"
              name="nombre"
              required
              autocomplete="name"
            />
          </div>
          <div class="form__row">
            <label class="form__label" for="email">Email</label>
            <input
              class="form__input"
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
            />
          </div>
          <div class="form__row">
            <label class="form__label" for="mensaje">Mensaje</label>
            <input class="form__input" type="text" id="mensaje" name="mensaje" required />
          </div>
          <div class="form__actions">
            <button type="submit" class="btn">Enviar</button>
          </div>
          <p class="form__feedback muted" id="formFeedback" hidden></p>
        </form>
      </section>

      <footer class="footer">
        <span class="muted">Generado con HTML + CSS + JS (sin frameworks).</span>
        <span class="muted" id="updatedAt"></span>
      </footer>

      <div class="back-top no-print">
        <button id="backToTopBtn" class="btn btn--ghost" type="button">
          Volver arriba
        </button>
      </div>
    </main>

    <script src="./main.js" defer></script>
  </body>
</html>
