<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Desarrollador</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="cv" id="cvRoot">
      <header class="hero">
        <div class="hero__left">
          <div class="avatar" aria-hidden="true">
            <span class="avatar__initials" id="initials">AP</span>
          </div>
          <div class="hero__meta">
            <h1 class="hero__name" id="fullName">—</h1>
            <p class="hero__role" id="role">—</p>
            <p class="hero__tagline" id="tagline">—</p>
            <div class="chips" id="topChips"></div>
          </div>
        </div>

        <div class="hero__right">
          <div class="actions">
            <button id="downloadPdfBtn" class="btn" type="button">Descargar PDF</button>
            <a id="githubBtn" class="btn btn--ghost" href="#" target="_blank" rel="noreferrer">GitHub</a>
          </div>

          <div class="contact" id="contact"></div>
        </div>
      </header>

      <section class="grid">
        <section class="card">
          <div class="card__head">
            <h2 class="card__title">Sobre mí</h2>
          </div>
          <p class="card__text" id="about">—</p>
        </section>

        <section class="card">
          <div class="card__head">
            <h2 class="card__title">Skills</h2>
            <span class="badge" id="yearsBadge">—</span>
          </div>
          <div class="skills" id="skills"></div>
        </section>
      </section>

      <section class="card">
        <div class="card__head">
          <h2 class="card__title">Experiencia</h2>
          <span class="muted" id="location">—</span>
        </div>
        <div class="timeline" id="experience"></div>
      </section>

      <section class="card">
        <div class="card__head">
          <h2 class="card__title">Proyectos</h2>
          <span class="muted">Repositorios / demos</span>
        </div>
        <div class="projects" id="projects"></div>
      </section>

      <footer class="footer">
        <span class="muted">Generado con HTML + CSS + JS (sin frameworks).</span>
        <span class="muted" id="updatedAt"></span>
      </footer>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
